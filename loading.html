<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Drop Cat Go Studio — Starting…</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0606;
    color: #f0e6d0;
    font-family: system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 28px;
  }
  .logo { font-size: 2.4rem; font-weight: 900; letter-spacing: .04em; color: #d4a017; }
  .sub  { font-size: .9rem; color: #8a7a6a; letter-spacing: .12em; text-transform: uppercase; }
  .spinner {
    width: 44px; height: 44px;
    border: 3px solid #2a1a1a;
    border-top-color: #c41e3a;
    border-radius: 50%;
    animation: spin .9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg { font-size: .82rem; color: #6a5a4a; }
</style>
</head>
<body>
<div class="logo">DROP CAT GO</div>
<div class="sub">Studio</div>
<div class="spinner"></div>
<div class="msg" id="msg">Starting server…</div>
<script>
const ports = Array.from({length: 20}, (_, i) => 7860 + i);
let attempt = 0;

async function poll() {
  attempt++;
  if (attempt > 3) document.getElementById('msg').textContent = 'Still loading… (model may be initialising)';
  for (const p of ports) {
    try {
      const r = await fetch('http://127.0.0.1:' + p + '/api/system',
                            { signal: AbortSignal.timeout(1200) });
      if (r.ok) { location.href = 'http://127.0.0.1:' + p; return; }
    } catch {}
  }
  setTimeout(poll, 1000);
}
poll();
</script>
</body>
</html>
